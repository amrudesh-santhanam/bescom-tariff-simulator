<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESCOM LT-5 Tariff Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" 
        integrity="sha512-CQBWl4fJHWbryGE+Pc7UAxWMUMNMWzWxF4SQo9CgkJIN1kx6djDQZjh3Y8SZ1d+6I+1zze6Z7kHXO7q3UyZAWw==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js" 
        integrity="sha512-tz0jOZaOg9RtWWB6AdxSkINQwIs7S5obj1Dlml9KewZLPTblTWCux5eLtnexBb8kbLUo5crPmjsi8/vI17Vw0w==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer">
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0;}
        .chart-container { position: relative; height: 400px; width: 100%; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; width: 100%; max-width: 400px;}
        .status { font-size: 14px; color: #7f8c8d; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BESCOM LT-5 Factory Billing Dashboard</h1>
        
        <div class="card">
            <h2>Session Selector</h2>
            <select id="sessionSelector">
                <option value="">Loading sessions...</option>
            </select>
            <span class="status" id="sessionStatus">Loading data.db...</span>
        </div>

        <div class="card">
            <h2>Scenario Selector</h2>
            <select id="caseSelector">
                <option value="Case_1_kW">Case 1: Consistent High Orders (3 shifts)</option>
                <option value="Case_2_kW">Case 2: Low Orders (1 Shift)</option>
                <option value="Case_3_kW">Case 3: Low Orders + 2 Day Spike</option>
                <option value="Case_4_kW">Case 4: 3 Weeks Max, 1 Week Holiday</option>
            </select>
        </div>

        <div class="card">
            <h2>1. Overall Monthly Bill Comparison</h2>
            <div class="chart-container">
                <canvas id="billChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>2. Penalty Breakdown (Fixed / Demand Charges Only)</h2>
            <div class="chart-container">
                <canvas id="penaltyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>3. Daily Load Spikes vs. Effective ToD Rate</h2>
            <div class="chart-container">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>4. Daily Total Energy Consumption</h2>
            <div class="chart-container">
                <canvas id="energyChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        let dataStd = [], dataDem = [], dataDaily = [], dataEnergy = [];
        let billChartInst = null, penaltyChartInst = null, dailyChartInst = null, energyChartInst = null;
        let db = null;

        function getProp(obj, key) {
            if (!obj) return undefined;
            const target = key.toLowerCase();
            const realKey = Object.keys(obj).find(k => k.toLowerCase() === target);
            return realKey ? obj[realKey] : undefined;
        }

        function rowsToObjects(result) {
            // FIXED: Checking for result.values instead of result.length
            if (!result || !result.columns || !result.values) return [];
            const columns = result.columns;
            const values = result.values;
            return values.map(row => {
                const obj = {};
                columns.forEach((col, index) => {
                    obj[col] = row[index];
                });
                return obj;
            });
        }

        function loadSessionData() {
            const sessionId = document.getElementById('sessionSelector').value;
            if (!sessionId || !db) return;

            // Removed string quotes around sessionId since schema is INTEGER
            const stdResult = db.exec(`SELECT * FROM billing_summary_standard WHERE session_id = ${sessionId}`)[0];
            const demResult = db.exec(`SELECT * FROM billing_summary_demand WHERE session_id = ${sessionId}`)[0];
            const dailyResult = db.exec(`SELECT * FROM daily_profile WHERE session_id = ${sessionId}`)[0];
            const energyResult = db.exec(`SELECT * FROM daily_energy_consumption WHERE session_id = ${sessionId}`)[0];

            dataStd = rowsToObjects(stdResult);
            dataDem = rowsToObjects(demResult);
            dataDaily = rowsToObjects(dailyResult);
            dataEnergy = rowsToObjects(energyResult);
            
            console.log("Data loaded for Session", sessionId);
            console.log("Standard Bill Data:", dataStd);
            
            updateCharts();
        }

        function clearChartInstances() {
            if (billChartInst) {
                billChartInst.destroy();
                billChartInst = null;
            }
            if (penaltyChartInst) {
                penaltyChartInst.destroy();
                penaltyChartInst = null;
            }
            if (dailyChartInst) {
                dailyChartInst.destroy();
                dailyChartInst = null;
            }
            if (energyChartInst) {
                energyChartInst.destroy();
                energyChartInst = null;
            }
        }

        async function loadDatabase() {
            const SQL = await initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/${file}`
            });

            const response = await fetch('./data.db');
            if (!response.ok) {
                throw new Error('Unable to locate or stream data.db from the local HTTP context.');
            }

            const buffer = await response.arrayBuffer();
            db = new SQL.Database(new Uint8Array(buffer));

            const latestSessionResult = db.exec('SELECT COALESCE(MAX(session_id), 0) AS latest_session_id FROM factory_load_data')[0];
            
            if (!latestSessionResult || !latestSessionResult.values) {
                 throw new Error('Database connected, but it appears to be completely empty.');
            }
            
            const latestSessionId = Number(latestSessionResult.values[0][0]);
            const sessionResult = db.exec('SELECT DISTINCT session_id FROM factory_load_data ORDER BY session_id');
            const sessionSelect = document.getElementById('sessionSelector');
            const sessionStatus = document.getElementById('sessionStatus');

            sessionSelect.innerHTML = '';
            if (sessionResult && sessionResult.length > 0 && sessionResult[0].values.length > 0) {
                sessionResult[0].values.forEach(([sessionId]) => {
                    const option = document.createElement('option');
                    option.value = sessionId;
                    option.textContent = `Session ${sessionId}`;
                    sessionSelect.appendChild(option);
                });
                sessionSelect.value = String(latestSessionId);
                sessionStatus.textContent = `Using latest available session ${latestSessionId}.`;
                sessionStatus.style.color = '#27ae60';
                loadSessionData();
            } else {
                sessionStatus.textContent = 'Data source online, but no active sessions were discovered.';
                sessionStatus.style.color = '#c0392b';
            }
        }

        document.getElementById('caseSelector').addEventListener('change', updateCharts);
        document.getElementById('sessionSelector').addEventListener('change', () => {
            const sessionStatus = document.getElementById('sessionStatus');
            sessionStatus.textContent = '';
            sessionStatus.style.color = '';
            loadSessionData();
        });

        function updateCharts() {
            const selectedCase = document.getElementById('caseSelector').value;
            clearChartInstances();

            if (dataStd.length > 0 && dataDem.length > 0) {
                const stdFiltered = dataStd.filter(d => getProp(d, 'case_name') === selectedCase);
                const demFiltered = dataDem.filter(d => getProp(d, 'case_name') === selectedCase);
                
                const labels = stdFiltered.map(d => (getProp(d, 'Sanctioned_Load_kW') || getProp(d, 'sanctioned_load_kw') || '0') + ' kW');

                billChartInst = new Chart(document.getElementById('billChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Total Standard Bill (Rs)', data: stdFiltered.map(d => parseFloat(getProp(d, 'Total_Bill_Rs'))), backgroundColor: '#34495e' },
                            { label: 'Total Demand-Based Bill (Rs)', data: demFiltered.map(d => parseFloat(getProp(d, 'Total_Bill_Rs'))), backgroundColor: '#3498db' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Sanctioned Load Configuration (kW)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Total Monthly Bill Amount (Rs)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });

                penaltyChartInst = new Chart(document.getElementById('penaltyChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Standard: Base Fixed Charge', data: stdFiltered.map(d => parseFloat(getProp(d, 'Base_Fixed_Charge_Rs'))), backgroundColor: '#7f8c8d', stack: 'Standard' },
                            { label: 'Standard: Penalty', data: stdFiltered.map(d => parseFloat(getProp(d, 'Penalty_Charge_Rs'))), backgroundColor: '#e74c3c', stack: 'Standard' },
                            { label: 'Demand: Base Demand Charge', data: demFiltered.map(d => parseFloat(getProp(d, 'Base_Demand_Charge_Rs'))), backgroundColor: '#95a5a6', stack: 'Demand' },
                            { label: 'Demand: Penalty', data: demFiltered.map(d => parseFloat(getProp(d, 'Penalty_Charge_Rs'))), backgroundColor: '#c0392b', stack: 'Demand' }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { stacked: true, title: { display: true, text: 'Sanctioned Load Configuration (kW)', font: { weight: 'bold' } } },
                            y: { stacked: true, title: { display: true, text: 'Capacity Charges Only (Rs)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });
            }

            if (dataDaily.length > 0) {
                const caseDaily = dataDaily.filter(d => getProp(d, 'case_name') === selectedCase);
                dailyChartInst = new Chart(document.getElementById('dailyChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: caseDaily.map(d => getProp(d, 'Date')),
                        datasets: [
                            {
                                label: 'Daily Peak Demand (kW)',
                                data: caseDaily.map(d => parseFloat(getProp(d, 'Daily_Max_kW'))),
                                borderColor: '#f39c12', backgroundColor: 'rgba(243, 156, 18, 0.1)',
                                fill: true, tension: 0.1, borderWidth: 2, yAxisID: 'y'
                            },
                            {
                                label: 'Effective per-kWh Rate (Rs/kWh)',
                                data: caseDaily.map(d => parseFloat(getProp(d, 'Daily_Effective_Rate'))),
                                borderColor: '#9b59b6', backgroundColor: 'transparent',
                                fill: false, tension: 0.1, borderWidth: 2, yAxisID: 'y1', borderDash: [5, 5]
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Timeline (Days of the Month)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Peak Demand Power (kW)', font: { weight: 'bold' } }, beginAtZero: true, position: 'left' },
                            y1: { title: { display: true, text: 'Effective Rate (Rs/kWh)', font: { weight: 'bold' } }, beginAtZero: true, position: 'right', grid: { drawOnChartArea: false } }
                        }
                    }
                });
            }

            if (dataEnergy.length > 0) {
                const targetCol = selectedCase.replace('_kW', '_kWh');
                energyChartInst = new Chart(document.getElementById('energyChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: dataEnergy.map(d => getProp(d, 'Date')),
                        datasets: [{
                            label: 'Daily Energy Consumed (kWh)',
                            data: dataEnergy.map(d => parseFloat(getProp(d, targetCol))),
                            backgroundColor: '#2ecc71'
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Timeline (Days of the Month)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Energy Consumption (kWh)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });
            }
        }

        loadDatabase().catch(error => {
            console.error(error);
            document.getElementById('sessionStatus').textContent = error.message;
            document.getElementById('sessionStatus').style.color = '#c0392b';
        });
    </script>
</body>
</html>
