<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESCOM LT-5 Tariff Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0;}
        .file-inputs { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .upload-btn { background: #3498db; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; display: inline-block; font-weight: bold;}
        input[type="file"] { display: none; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; width: 100%; max-width: 400px;}
        .status { font-size: 14px; color: #7f8c8d; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BESCOM LT-5 Factory Billing Dashboard</h1>
        
        <div class="card file-inputs">
            <div>
                <label class="upload-btn">Upload Standard Summary <input type="file" id="stdFile" accept=".csv"></label>
                <span class="status" id="stdStatus">Missing</span>
            </div>
            <div>
                <label class="upload-btn">Upload Demand Summary <input type="file" id="demFile" accept=".csv"></label>
                <span class="status" id="demStatus">Missing</span>
            </div>
            <div>
                <label class="upload-btn">Upload Daily Profile <input type="file" id="dailyFile" accept=".csv"></label>
                <span class="status" id="dailyStatus">Missing</span>
            </div>
            <div>
                <label class="upload-btn">Upload Daily Energy <input type="file" id="energyFile" accept=".csv"></label>
                <span class="status" id="energyStatus">Missing</span>
            </div>
        </div>

        <div class="card">
            <h2>Scenario Selector</h2>
            <select id="caseSelector">
                <option value="Case_1_kW">Case 1: Consistent High Orders (3 shifts)</option>
                <option value="Case_2_kW">Case 2: Low Orders (1 Shift)</option>
                <option value="Case_3_kW">Case 3: Low Orders + 2 Day Spike</option>
                <option value="Case_4_kW">Case 4: 3 Weeks Max, 1 Week Holiday</option>
            </select>
        </div>

        <div class="card">
            <h2>1. Overall Monthly Bill Comparison</h2>
            <div class="chart-container">
                <canvas id="billChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>2. Penalty Breakdown (Fixed / Demand Charges Only)</h2>
            <div class="chart-container">
                <canvas id="penaltyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>3. Daily Load Spikes vs. Effective ToD Rate</h2>
            <div class="chart-container">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>4. Daily Total Energy Consumption</h2>
            <div class="chart-container">
                <canvas id="energyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let dataStd = [], dataDem = [], dataDaily = [], dataEnergy = [];
        let billChartInst = null, penaltyChartInst = null, dailyChartInst = null, energyChartInst = null;

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = line.split(',');
                let obj = {};
                headers.forEach((h, i) => obj[h.trim()] = values[i] ? values[i].trim() : "");
                return obj;
            });
        }

        function handleUpload(inputId, statusId, dataVarStr) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                document.getElementById(statusId).innerText = "Loaded: " + file.name;
                document.getElementById(statusId).style.color = "#27ae60";
                const reader = new FileReader();
                reader.onload = function(event) {
                    if(dataVarStr === 'std') dataStd = parseCSV(event.target.result);
                    if(dataVarStr === 'dem') dataDem = parseCSV(event.target.result);
                    if(dataVarStr === 'daily') dataDaily = parseCSV(event.target.result);
                    if(dataVarStr === 'energy') dataEnergy = parseCSV(event.target.result);
                    updateCharts();
                };
                reader.readAsText(file);
            });
        }

        handleUpload('stdFile', 'stdStatus', 'std');
        handleUpload('demFile', 'demStatus', 'dem');
        handleUpload('dailyFile', 'dailyStatus', 'daily');
        handleUpload('energyFile', 'energyStatus', 'energy');
        document.getElementById('caseSelector').addEventListener('change', updateCharts);

        function updateCharts() {
            const selectedCase = document.getElementById('caseSelector').value;
            
            // --- Charts 1 & 2: Summaries ---
            if (dataStd.length > 0 && dataDem.length > 0) {
                const stdFiltered = dataStd.filter(d => d.Case === selectedCase);
                const demFiltered = dataDem.filter(d => d.Case === selectedCase);
                const labels = stdFiltered.map(d => d.Sanctioned_Load_kW + ' kW');
                
                if (billChartInst) billChartInst.destroy();
                billChartInst = new Chart(document.getElementById('billChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Total Standard Bill (Rs)', data: stdFiltered.map(d => parseFloat(d.Total_Bill_Rs)), backgroundColor: '#34495e' },
                            { label: 'Total Demand-Based Bill (Rs)', data: demFiltered.map(d => parseFloat(d.Total_Bill_Rs)), backgroundColor: '#3498db' }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Sanctioned Load Configuration (kW)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Total Monthly Bill Amount (Rs)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });

                if (penaltyChartInst) penaltyChartInst.destroy();
                penaltyChartInst = new Chart(document.getElementById('penaltyChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Standard: Base Fixed Charge', data: stdFiltered.map(d => parseFloat(d.Base_Fixed_Charge_Rs)), backgroundColor: '#7f8c8d', stack: 'Standard' },
                            { label: 'Standard: Penalty', data: stdFiltered.map(d => parseFloat(d.Penalty_Charge_Rs)), backgroundColor: '#e74c3c', stack: 'Standard' },
                            { label: 'Demand: Base Demand Charge', data: demFiltered.map(d => parseFloat(d.Base_Demand_Charge_Rs)), backgroundColor: '#95a5a6', stack: 'Demand' },
                            { label: 'Demand: Penalty', data: demFiltered.map(d => parseFloat(d.Penalty_Charge_Rs)), backgroundColor: '#c0392b', stack: 'Demand' }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { stacked: true, title: { display: true, text: 'Sanctioned Load Configuration (kW)', font: { weight: 'bold' } } },
                            y: { stacked: true, title: { display: true, text: 'Capacity Charges Only (Rs)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });
            }

            // --- Chart 3: Daily Metrics (Dual Axis) ---
            if (dataDaily.length > 0) {
                const caseDaily = dataDaily.filter(d => d.Case === selectedCase);
                if (dailyChartInst) dailyChartInst.destroy();
                dailyChartInst = new Chart(document.getElementById('dailyChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: caseDaily.map(d => d.Date),
                        datasets: [
                            {
                                label: 'Daily Peak Demand (kW)',
                                data: caseDaily.map(d => parseFloat(d.Daily_Max_kW)),
                                borderColor: '#f39c12', backgroundColor: 'rgba(243, 156, 18, 0.1)',
                                fill: true, tension: 0.1, borderWidth: 2, yAxisID: 'y'
                            },
                            {
                                label: 'Effective per-kWh Rate (Rs/kWh)',
                                data: caseDaily.map(d => parseFloat(d.Daily_Effective_Rate)),
                                borderColor: '#9b59b6', backgroundColor: 'transparent',
                                fill: false, tension: 0.1, borderWidth: 2, yAxisID: 'y1', borderDash: [5, 5]
                            }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Timeline (Days of the Month)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Peak Demand Power (kW)', font: { weight: 'bold' } }, beginAtZero: true, position: 'left' },
                            y1: { title: { display: true, text: 'Effective Rate (Rs/kWh)', font: { weight: 'bold' } }, beginAtZero: true, position: 'right', grid: { drawOnChartArea: false } }
                        }
                    }
                });
            }

            // --- Chart 4: Daily Energy Consumption ---
            if (dataEnergy.length > 0) {
                const targetCol = selectedCase.replace('_kW', '_kWh');
                if (energyChartInst) energyChartInst.destroy();
                energyChartInst = new Chart(document.getElementById('energyChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: dataEnergy.map(d => d.Date),
                        datasets: [{
                            label: 'Daily Energy Consumed (kWh)',
                            data: dataEnergy.map(d => parseFloat(d[targetCol])),
                            backgroundColor: '#2ecc71'
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Timeline (Days of the Month)', font: { weight: 'bold' } } },
                            y: { title: { display: true, text: 'Energy Consumption (kWh)', font: { weight: 'bold' } }, beginAtZero: true }
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
